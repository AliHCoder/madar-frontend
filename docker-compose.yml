version: '3.8'

services:
  promptyab:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_PROMPT_API_URL: ${NEXT_PUBLIC_PROMPT_API_URL}
        NEXT_PUBLIC_PACKAGE_NAME: ${NEXT_PUBLIC_PACKAGE_NAME}
        NEXT_PUBLIC_PACKAGE_NAME_PAYMENT: ${NEXT_PUBLIC_PACKAGE_NAME_PAYMENT}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    container_name: promptyab-app
